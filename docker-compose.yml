version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: apexjudge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apexjudge-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexjudge-backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PROBLEMS_JSON_PATH=/app/backend/app/problems.json
      - PROBLEMS_DIR=/app/backend/problems
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - apexjudge-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexjudge-worker
    command: python -m backend.app.workers.grader
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PROBLEMS_JSON_PATH=/app/backend/app/problems.json
      - PROBLEMS_DIR=/app/backend/problems
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - .:/app
      # Mount the Docker socket to allow the worker to manage sandboxed containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - apexjudge-net

networks:
  apexjudge-net:
    driver: bridge

volumes:
  redis_data:
