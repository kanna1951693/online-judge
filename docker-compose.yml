version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apexjudge-postgres
    environment:
      POSTGRES_DB: apexjudge
      POSTGRES_USER: apexjudge
      POSTGRES_PASSWORD: apexjudge_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apexjudge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apexjudge -d apexjudge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: apexjudge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apexjudge-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexjudge-backend
    command: >
      sh -c "
        python -m alembic upgrade head &&
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://apexjudge:apexjudge_secret@postgres:5432/apexjudge
      - PROBLEMS_JSON_PATH=/app/backend/app/problems.json
      - PROBLEMS_DIR=/app/backend/problems
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-supabase-jwt-secret-placeholder-for-dev-only}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - apexjudge-net


  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexjudge-worker
    command: python -m backend.app.judge.grader
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://apexjudge:apexjudge_secret@postgres:5432/apexjudge
      - PROBLEMS_JSON_PATH=/app/backend/app/problems.json
      - PROBLEMS_DIR=/app/backend/problems
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-supabase-jwt-secret-placeholder-for-dev-only}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - apexjudge-net

networks:
  apexjudge-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
